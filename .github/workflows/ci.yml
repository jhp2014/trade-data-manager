name: CI

on:
  push:
    branches: [main]
  pull_request:

# 같은 브랜치에서 새 푸시가 오면 진행 중인 실행을 취소(중복 절약).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: type-check · test · lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # packageManager(pnpm@10.5.2) 필드를 그대로 사용.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # 도메인 안전망: 타입 → 테스트(데이터 계층은 PGlite 인메모리라 외부 DB 불필요) → 린트.
      - name: Type-check
        run: pnpm type-check

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint
